name: Providence Tower v2 CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - "core/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ptenv-prod
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Google Auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    # --- CRUCIAL STEPS FOR CACHING ---
    # 1. Authenticate Docker directly to Google's Registry
    - name: Docker Login to GCR
      uses: docker/login-action@v3
      with:
        registry: gcr.io
        username: _json_key
        password: ${{ secrets.GCP_SA_KEY }}

    # 2. Set up Buildx (Docker's advanced build engine that enables the cache)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. Build and Push using GitHub's Internal Cache Backend
    - name: Build and Push Container
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: gcr.io/${{ secrets.GCP_PROJECT_ID }}/providence-tower:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    # ---------------------------------

    - name: Deploy to Cloud Run
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        VECTOR_STORE_PROVIDER: ${{ vars.VECTOR_STORE_PROVIDER }}
        UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
        UPSTASH_VECTOR_URL: ${{ secrets.UPSTASH_VECTOR_URL }}
        UPSTASH_VECTOR_TOKEN: ${{ secrets.UPSTASH_VECTOR_TOKEN }}
        RATE_LIMIT_SHORT_MAX_REQUESTS: ${{ vars.RATE_LIMIT_SHORT_MAX_REQUESTS }}
      run: |
        gcloud run deploy providence-tower \
          --image=gcr.io/${{ secrets.GCP_PROJECT_ID }}/providence-tower:${{ github.sha }} \
          --region=us-central1 \
          --platform=managed \
          --allow-unauthenticated \
          --min-instances=0 \
          --max-instances=2 \
          --cpu=1 \
          --memory=2Gi \
          --set-env-vars=OPENAI_API_KEY="$OPENAI_API_KEY",VECTOR_STORE_PROVIDER="$VECTOR_STORE_PROVIDER",UPSTASH_REDIS_URL="$UPSTASH_REDIS_URL",UPSTASH_VECTOR_URL="$UPSTASH_VECTOR_URL",UPSTASH_VECTOR_TOKEN="$UPSTASH_VECTOR_TOKEN",RATE_LIMIT_SHORT_MAX_REQUESTS="$RATE_LIMIT_SHORT_MAX_REQUESTS"
