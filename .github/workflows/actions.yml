name: Providence Tower v2 CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - "core/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ptenv-prod
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Google Auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    # --- CRUCIAL STEPS FOR CACHING ---
    # 1. Authenticate Docker directly to Google's Registry
    - name: Docker Login to GCR
      uses: docker/login-action@v3
      with:
        registry: gcr.io
        username: _json_key
        password: ${{ secrets.GCP_SA_KEY }}

    # 2. Set up Buildx (Docker's advanced build engine that enables the cache)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. Build and Push using GitHub's Internal Cache Backend
    - name: Build and Push Container
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: gcr.io/${{ secrets.GCP_PROJECT_ID }}/providence-tower:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    # ---------------------------------

    - name: Write env vars file for Cloud Run
      shell: bash
      run: |
        cat > /tmp/cloudrun_env.yaml << 'EOF'
        # --- Required: must be set for the app to function ---
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        VECTOR_STORE_PROVIDER: ${{ secrets.VECTOR_STORE_PROVIDER }}
        UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
        UPSTASH_VECTOR_URL: ${{ secrets.UPSTASH_VECTOR_URL }}
        UPSTASH_VECTOR_TOKEN: ${{ secrets.UPSTASH_VECTOR_TOKEN }}
        EOF

        # --- Optional: only write if the secret exists (Python defaults handle the rest) ---
        if [ -n "${{ secrets.OPENAI_BASE_URL }}" ]; then
          echo "OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}" >> /tmp/cloudrun_env.yaml
        fi
        if [ -n "${{ secrets.EMBEDDING_MODEL }}" ]; then
          echo "EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}" >> /tmp/cloudrun_env.yaml
        fi
        if [ -n "${{ secrets.PLANNER_AGENT }}" ]; then
          echo "PLANNER_AGENT: ${{ secrets.PLANNER_AGENT }}" >> /tmp/cloudrun_env.yaml
        fi
        if [ -n "${{ secrets.PLANNER_MODEL }}" ]; then
          echo "PLANNER_MODEL: ${{ secrets.PLANNER_MODEL }}" >> /tmp/cloudrun_env.yaml
        fi
        if [ -n "${{ secrets.PLANNER_PRESERVE_RICH_QUERY }}" ]; then
          echo "PLANNER_PRESERVE_RICH_QUERY: ${{ secrets.PLANNER_PRESERVE_RICH_QUERY }}" >> /tmp/cloudrun_env.yaml
        fi
        if [ -n "${{ secrets.RERANK_ENABLED }}" ]; then
          echo "RERANK_ENABLED: ${{ secrets.RERANK_ENABLED }}" >> /tmp/cloudrun_env.yaml
        fi
        if [ -n "${{ secrets.RERANK_MODEL }}" ]; then
          echo "RERANK_MODEL: ${{ secrets.RERANK_MODEL }}" >> /tmp/cloudrun_env.yaml
        fi
        if [ -n "${{ secrets.RERANK_TOP_K }}" ]; then
          echo "RERANK_TOP_K: ${{ secrets.RERANK_TOP_K }}" >> /tmp/cloudrun_env.yaml
        fi
        if [ -n "${{ secrets.RERANK_MIN_TOP_SCORE }}" ]; then
          echo "RERANK_MIN_TOP_SCORE: ${{ secrets.RERANK_MIN_TOP_SCORE }}" >> /tmp/cloudrun_env.yaml
        fi
        if [ -n "${{ secrets.RAG_HISTORY_WINDOW }}" ]; then
          echo "RAG_HISTORY_WINDOW: ${{ secrets.RAG_HISTORY_WINDOW }}" >> /tmp/cloudrun_env.yaml
        fi
        if [ -n "${{ secrets.RAG_SESSION_TTL_SECONDS }}" ]; then
          echo "RAG_SESSION_TTL_SECONDS: ${{ secrets.RAG_SESSION_TTL_SECONDS }}" >> /tmp/cloudrun_env.yaml
        fi
        if [ -n "${{ secrets.RATE_LIMIT_SHORT_WINDOW_SECONDS }}" ]; then
          echo "RATE_LIMIT_SHORT_WINDOW_SECONDS: ${{ secrets.RATE_LIMIT_SHORT_WINDOW_SECONDS }}" >> /tmp/cloudrun_env.yaml
        fi
        if [ -n "${{ secrets.RATE_LIMIT_SHORT_MAX_REQUESTS }}" ]; then
          echo "RATE_LIMIT_SHORT_MAX_REQUESTS: ${{ secrets.RATE_LIMIT_SHORT_MAX_REQUESTS }}" >> /tmp/cloudrun_env.yaml
        fi
        if [ -n "${{ secrets.RATE_LIMIT_LONG_WINDOW_SECONDS }}" ]; then
          echo "RATE_LIMIT_LONG_WINDOW_SECONDS: ${{ secrets.RATE_LIMIT_LONG_WINDOW_SECONDS }}" >> /tmp/cloudrun_env.yaml
        fi
        if [ -n "${{ secrets.RATE_LIMIT_LONG_MAX_REQUESTS }}" ]; then
          echo "RATE_LIMIT_LONG_MAX_REQUESTS: ${{ secrets.RATE_LIMIT_LONG_MAX_REQUESTS }}" >> /tmp/cloudrun_env.yaml
        fi

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy providence-tower \
          --image=gcr.io/${{ secrets.GCP_PROJECT_ID }}/providence-tower:${{ github.sha }} \
          --region=us-central1 \
          --platform=managed \
          --allow-unauthenticated \
          --min-instances=0 \
          --max-instances=2 \
          --cpu=1 \
          --memory=2Gi \
          --env-vars-file=/tmp/cloudrun_env.yaml
